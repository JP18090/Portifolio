spring.application.name=portfolio-api

# Server Configuration - Render uses PORT env variable
server.port=${PORT:8080}
server.servlet.context-path=/api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console - disabled in production
spring.h2.console.enabled=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Certificate Storage Path
certificate.upload.dir=/app/certificados

# Logging
logging.level.root=INFO
logging.level.com.portfolio=INFO
