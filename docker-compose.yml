version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: portfolio-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=render
      - JAVA_OPTS=-Xmx512m -Xms256m
      - PORT=8080
    volumes:
      - ./backend/src/main/resources/certificados:/app/certificados
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: portfolio-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    environment:
      - PORT=3000
    restart: unless-stopped

networks:
  portfolio-network:
    driver: bridge
