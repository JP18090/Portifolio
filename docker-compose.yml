version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: portfolio-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      # confirme que esse caminho existe no host e que o app lê de /app/certificados
      - ./backend/src/main/resources/certificados:/app/certificados
    networks:
      - portfolio-network
    healthcheck:
      # Evita depender de curl (que nem sempre vem instalado)
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: portfolio-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    environment:
      # CRA: mantém REACT_APP_*
      - REACT_APP_API_URL=http://backend:8080/api
      # Se for Vite, mude para:
      # - VITE_API_URL=http://backend:8080/api
    restart: unless-stopped

networks:
  portfolio-network:
    driver: bridge

# Removida a duplicidade; deixe apenas UMA definição.
volumes:
  certificates:
    driver: local
